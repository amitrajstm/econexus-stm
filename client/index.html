<!doctype html>
<html lang="en">
  <head>
    <!-- BASIC -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- TITLE -->
    <title>EcoNexus | Connecting Innovation with Sustainability</title>

    <!-- SEO -->
    <meta
      name="description"
      content="EcoNexus is an AI-powered green innovation platform connecting innovators, institutions, and organizations to accelerate sustainable solutions. Submit ideas, collaborate smarter, and drive global environmental impact."
    />

    <meta
      name="keywords"
      content="EcoNexus, green innovation platform, sustainability technology, climate tech, AI innovation, renewable energy solutions, environmental innovation, eco startups, climate innovation, smart sustainability"
    />

    <meta name="author" content="EcoNexus Team" />
    <meta name="robots" content="index, follow" />

    <!-- BRAND COLOR -->
    <meta name="theme-color" content="#10b981" />
    <script>
      (function () {
        var theme = localStorage.getItem("theme");
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>

    <!-- OPEN GRAPH (LinkedIn, WhatsApp, Facebook Preview) -->
    <meta property="og:title" content="EcoNexus | Green Innovation Platform" />
    <meta
      property="og:description"
      content="Join EcoNexus — the AI-powered ecosystem where sustainable ideas become real-world impact."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/preview.png" />
    <meta property="og:url" content="https://econexus.ai" />

    <!-- TWITTER PREVIEW -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="EcoNexus | Connecting Innovation with Sustainability"
    />
    <meta
      name="twitter:description"
      content="Accelerate green innovation with AI-powered collaboration and institutional support."
    />
    <meta name="twitter:image" content="/preview.png" />

    <!-- FAVICONS -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- GOOGLE FONT (INTER — Startup Standard) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- PERFORMANCE BOOST -->
    <link rel="preconnect" href="https://images.unsplash.com" />
  </head>

  <body style="margin: 0; font-family: Inter, sans-serif">
    <!-- React Root -->
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
